<style>
  :root{
    --green:#548235; --green-bg:#e2efda;
    --orange:#c55a11; --orange-bg:#fbe5d6;
    --blue:#1f4e79; --blue-bg:#deebf7;
    --gold:#bf8f00; --gold-bg:#fff2cc;
    --line:#d0d7de; --muted:#666;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,'Segoe UI',Tahoma,sans-serif;background:#f4f6f9;color:#222;font-size:15px}
  header{background:var(--blue);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:5}
  header h1{font-size:17px;margin:0;font-weight:700}
  header .who{font-size:12px;opacity:.9}
  header .who b{display:block;font-size:13px}
  .wrap{max-width:1100px;margin:0 auto;padding:14px}

  /* login */
  #login{max-width:340px;margin:8vh auto;background:#fff;border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,.08);padding:26px 22px}
  #login h2{margin:0 0 4px;font-size:20px;text-align:center;color:var(--blue)}
  #login p{margin:0 0 18px;text-align:center;color:var(--muted);font-size:13px}
  label{display:block;font-size:13px;font-weight:600;margin:10px 0 4px;color:#333}
  input,select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:15px;background:#fff}
  input:focus,select:focus{outline:none;border-color:var(--blue)}
  .btn{width:100%;padding:12px;border:0;border-radius:9px;background:var(--blue);color:#fff;font-size:16px;font-weight:700;margin-top:16px;cursor:pointer}
  .btn:active{opacity:.85}
  .err{color:#c0392b;font-size:13px;text-align:center;margin-top:10px;min-height:16px}

  /* filters */
  .filters{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:14px}
  .frow{display:flex;flex-wrap:wrap;gap:10px}
  .frow > div{flex:1;min-width:130px}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{flex:1;border:0;background:#fff;padding:10px;font-size:14px;cursor:pointer;color:#444}
  .seg button.on{background:var(--blue);color:#fff;font-weight:700}

  /* cards */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
  .card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:5px solid var(--blue)}
  .card.out{border-color:var(--green)} .card.in{border-color:var(--orange)}
  .card.bal{border-color:var(--blue)} .card.money{border-color:var(--gold)}
  .card .lbl{font-size:12px;color:var(--muted)}
  .card .val{font-size:22px;font-weight:800;margin-top:2px}
  .card .sub{font-size:12px;color:var(--muted);margin-top:2px}

  .panel{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:14px}
  .panel h3{margin:0 0 10px;font-size:15px}
  canvas{max-height:300px}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:8px 6px;text-align:center;border-bottom:1px solid #eee}
  th{background:#f0f3f7;font-weight:700;position:sticky;top:0}
  td.k{text-align:left;font-weight:600}
  tr.total td{background:var(--gold-bg);font-weight:800}
  .tblwrap{overflow-x:auto}
  .hidden{display:none}
  .foot{text-align:center;color:var(--muted);font-size:12px;padding:10px}

  /* loading overlay */
  #loading{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;
    background:rgba(244,246,249,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
  #loading.show{display:flex}
  .spinner{width:54px;height:54px;border:5px solid rgba(31,78,121,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
  #loading .txt{color:var(--blue);font-weight:700;font-size:14px}

  /* modal ยืนยัน */
  .modal-bg{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}

  #cAddSuggest .sg .plus{color:#0b8043;font-weight:800;font-size:18px;flex:0 0 auto}
  #cAddSuggest .none{font-size:12px;color:var(--muted);padding:6px 4px}
  .chkitem{border-bottom:1px solid #eee}

  .noteBtn{border:0;background:#eef1f5;border-radius:7px;width:32px;height:32px;cursor:pointer;font-size:14px;flex:0 0 auto}

  .noterow{padding:0 6px 9px 6px}

  .chkrow{display:flex;align-items:center;gap:8px;padding:8px 6px;font-size:13px}
  .chkrow .nm{flex:1;min-width:0}

  .chkrow .exp{width:54px;text-align:center;color:var(--muted)}

<script>
// ====== ตั้งค่า: ใส่ URL ของ GAS Web App (ลงท้าย /exec) ======
const API_URL = 'https://script.google.com/macros/s/AKfycbyN_hjC_W4Sf9RBst8cnZvEuHlHDal5d4_OD7Uo1-27xcW6ktK2Fz6whoX2CUMz57gi/exec';

// ====== JSONP (เลี่ยง CORS) ======
function api(params, cb){
  const name = 'jsonp_' + Math.floor(Math.random()*1e9) + '_' + (api._n=(api._n||0)+1);
  const s = document.createElement('script');
  let done = false;
  window[name] = function(res){ done=true; cleanup(); cb(null, res); };
  function cleanup(){ delete window[name]; if(s.parentNode) s.parentNode.removeChild(s); }
  s.onerror = function(){ if(!done){ cleanup(); cb('เชื่อมต่อไม่ได้ — ตรวจ API_URL'); } };
  const qs = Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
  s.src = API_URL + '?' + qs + '&callback=' + name;
  document.body.appendChild(s);
  setTimeout(()=>{ if(!done){ cleanup(); cb('หมดเวลาเชื่อมต่อ'); } }, 20000);
}

// ====== STATE ======
let CRED = null;       // {user, pass}
let DATA = null;       // {records, malls, canSeeMoney, role, name}
let GRAN = 'month';
let MIN_DATE = '', MAX_DATE = '';  // ช่วงวันเต็มของข้อมูล (ปุ่มทั้งหมด)

const $ = id => document.getElementById(id);
const monthNames = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const fmt = n => (n||0).toLocaleString('th-TH');
const fmtM = n => (n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});

// ====== LOGIN ======
$('loginBtn').onclick = doLogin;
$('p').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

let loadTimer = null, loadPct = 0, loadBase = '';
function showLoading(txt){
  loadBase = txt || 'กำลังโหลด...';
  loadPct = 0;
  const el = $('loading').querySelector('.txt');
  el.textContent = loadBase + ' 0%';
  $('loading').classList.add('show');
  clearInterval(loadTimer);
  loadTimer = setInterval(()=>{
    loadPct += Math.max(1, Math.round((99 - loadPct) * 0.08)); // ค่อยๆช้าลง เข้าใกล้ 99
    if(loadPct > 99) loadPct = 99;
    el.textContent = loadBase + ' ' + loadPct + '%';
  }, 120);
}
function hideLoading(){
  clearInterval(loadTimer);
  const el = $('loading').querySelector('.txt');
  el.textContent = loadBase + ' 100%';
  $('loading').classList.remove('show');
}

// ====== จำล็อกอิน (idle timeout) ======
const AUTH_KEY = 'sm_auth';
const AUTH_TIMEOUT = 8 * 60 * 60 * 1000; // 8 ชม. ไม่ใช้งานค่อยล็อกอินใหม่ (รีเฟรชภายในเวลานี้ไม่ต้องล็อกอิน)
function saveAuth(user, pass){ try{ localStorage.setItem(AUTH_KEY, JSON.stringify({user, pass, t: Date.now()})); }catch(e){} }
function loadAuth(){
  try{
    const a = JSON.parse(localStorage.getItem(AUTH_KEY) || 'null');
    if(a && a.user && (Date.now() - a.t) < AUTH_TIMEOUT) return a;
  }catch(e){}
  return null;
}
function clearAuth(){ try{ localStorage.removeItem(AUTH_KEY); }catch(e){} }

function doLogin(){
  const user = $('u').value.trim(), pass = $('p').value;
  if(!user || !pass){ $('loginErr').textContent='กรอก username/password'; return; }
  $('loginErr').textContent='';
  showLoading('กำลังเข้าสู่ระบบ...');
  api({user, pass, action:'data'}, (err, res)=>{
    hideLoading();
    if(err){ $('loginErr').textContent=err; return; }
    if(!res.ok){ $('loginErr').textContent=res.error||'เข้าสู่ระบบไม่สำเร็จ'; return; }
    CRED = {user, pass}; DATA = res; saveAuth(user, pass);
    startApp();
  });
}

// ลองล็อกอินอัตโนมัติจากที่จำไว้ (ตอนรีเฟรช)
function tryAutoLogin(){
  const a = loadAuth();
  if(!a) return;
  showLoading('กำลังเข้าสู่ระบบ...');
  api({user:a.user, pass:a.pass, action:'data'}, (err, res)=>{
    hideLoading();
    if(err || !res || !res.ok){ clearAuth(); return; } // หมดอายุ/ผิด → ให้ล็อกอินใหม่
    CRED = {user:a.user, pass:a.pass}; DATA = res; saveAuth(a.user, a.pass); // ต่ออายุ
    startApp();
  });
}

$('logout').onclick = e=>{ e.preventDefault(); clearAuth(); location.reload(); };

// ====== APP ======
function startApp(){
  $('login').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('whoName').textContent = DATA.name;
  $('whoRole').textContent = ({admin:'ผู้ดูแล',staff:'พนักงาน',user:'ผู้ใช้'})[DATA.role] || DATA.role;

  // ห้าง dropdown
  const sel = $('fMall');
  sel.innerHTML = '<option value="__ALL__">ทุกห้าง (รวม)</option>' +
    DATA.malls.map(m=>`<option value="${m}">${m}</option>`).join('');

  // ช่วงวันที่ default = วันแรกของข้อมูล .. วันนี้ (ครอบรวมวันเช็คสต็อกด้วย)
  const ds = DATA.records.map(r=>r.d).sort();
  if(ds.length){ MIN_DATE = ds[0]; MAX_DATE = ds[ds.length-1]; }
  $('fFrom').value = MIN_DATE || todayStr();
  $('fTo').value = todayStr(); // ถึงวันนี้เสมอ ข้อมูลไม่ตกหล่น

  // events — กรองทีเดียว อัปเดตทั้งการ์ด/กราฟ/แถบกระทบเช็ค พร้อมกัน
  const refreshAll = ()=>{ render(); loadMallStatus(sel.value); };
  sel.onchange = refreshAll;
  $('fFrom').onchange = refreshAll;
  $('fTo').onchange = refreshAll;
  document.querySelectorAll('#segGran button').forEach(b=>{
    b.onclick = ()=>{
      GRAN=b.dataset.g;
      document.querySelectorAll('#segGran button').forEach(x=>x.classList.toggle('on',x===b));
      resetRange(GRAN);   // รีเซ็ตช่วงวันเป็น เดือนนี้ / ปีนี้
      refreshAll();
    };
  });
  render();

  setupNav();
  setupCheck();
  setupHist();

  // ===== สิทธิ์เข้าหน้า ตาม role =====
  // admin: รายงาน+รายงานเช็ค+เช็คสต็อก / staff: รายงานเช็ค+เช็คสต็อก / user: เช็คสต็อก
  const ROLE_VIEWS = { admin:['dash','hist','check'], staff:['hist','check'], user:['check'] };
  const allowed = ROLE_VIEWS[DATA.role] || ['check'];
  document.querySelectorAll('#nav button').forEach(b=>{
    b.style.display = allowed.indexOf(b.dataset.v) >= 0 ? '' : 'none';
  });
  // ปุ่มโหลดข้อมูลล่าสุด ใช้กับหน้ารายงานเป็นหลัก → โชว์เฉพาะคนที่เข้าหน้ารายงานได้
  $('btnRefresh').parentElement.style.display = allowed.indexOf('dash') >= 0 ? '' : 'none';
  switchView(allowed[0]); // เปิดหน้าแรกที่เข้าได้
  if(allowed.indexOf('dash') >= 0) loadMallStatus(sel.value); // โหลดยอดกระทบเฉพาะถ้ามีหน้ารายงาน
}

// รีเซ็ตช่วงวันที่ตามแบบที่เลือก (เดือนนี้ / ปีนี้) อิงวันปัจจุบัน
function resetRange(gran){
  if(gran==='all'){ $('fFrom').value = MIN_DATE; $('fTo').value = todayStr(); return; }
  const now = new Date(), y = now.getFullYear();
  const pad = n => String(n).padStart(2,'0');
  const today = `${y}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  if(gran==='year'){ $('fFrom').value = `${y}-01-01`; }
  else             { $('fFrom').value = `${y}-${pad(now.getMonth()+1)}-01`; }
  $('fTo').value = today;
}

// คีย์ช่วงเวลาจากวันที่ตาม granularity
function periodKey(d){
  if(GRAN==='day') return d;                       // 2026-05-07
  if(GRAN==='year') return d.slice(0,4);           // 2026
  return d.slice(0,7);                              // 2026-05
}
function periodLabel(k){
  if(GRAN==='day'){ const [y,m,dd]=k.split('-'); return `${dd}/${m}/${y}`; }
  if(GRAN==='year') return 'ปี '+k;
  const [y,m]=k.split('-'); return monthNames[+m-1]+' '+y;
}

// plugin: เขียนตัวเลขบนยอดแท่ง
const barValueLabels = {
  id:'barValueLabels',
  afterDatasetsDraw(c){
    const ctx=c.ctx;
    c.data.datasets.forEach((ds,i)=>{
      const meta=c.getDatasetMeta(i);
      if(meta.hidden) return;
      meta.data.forEach((bar,idx)=>{
        const v=ds.data[idx];
        if(!v) return;
        ctx.save();
        ctx.fillStyle='#333';
        ctx.font='bold 11px sans-serif';
        ctx.textAlign='center';
        ctx.textBaseline='bottom';
        ctx.fillText(v.toLocaleString('th-TH'), bar.x, bar.y-2);
        ctx.restore();
      });
    });
  }
};

let chart=null;
function render(){
  const mall=$('fMall').value, from=$('fFrom').value, to=$('fTo').value;
  const money = DATA.canSeeMoney;

  // filter
  const recs = DATA.records.filter(r=>
    (mall==='__ALL__'||r.m===mall) &&
    (!from || r.d>=from) && (!to || r.d<=to)
  );

  // group by period
  const groups={}; const order=[];
  recs.forEach(r=>{
    const k=periodKey(r.d);
    if(!groups[k]){ groups[k]={outQR:new Set(),outQty:0,outVal:0,inQR:new Set(),inQty:0,inVal:0}; order.push(k); }
    const g=groups[k];
    if(r.t==='out'){ g.outQR.add(r.qr); g.outQty+=r.q; g.outVal+=r.v||0; }
    else           { g.inQR.add(r.qr);  g.inQty+=r.q;  g.inVal+=r.v||0; }
  });
  order.sort();

  // totals
  let T={outSku:new Set(),outQty:0,outVal:0,inSku:new Set(),inQty:0,inVal:0};
  recs.forEach(r=>{ if(r.t==='out'){T.outSku.add(r.qr);T.outQty+=r.q;T.outVal+=r.v||0;} else {T.inSku.add(r.qr);T.inQty+=r.q;T.inVal+=r.v||0;} });
  const balQty=T.outQty-T.inQty, balVal=T.outVal-T.inVal;

  // cards
  let cards=`
    <div class="card out"><div class="lbl">จ่าย (เข้าห้าง)</div><div class="val">${fmt(T.outQty)}</div><div class="sub">${T.outSku.size} SKU</div></div>
    <div class="card in"><div class="lbl">รับ (คืนคลัง)</div><div class="val">${fmt(T.inQty)}</div><div class="sub">${T.inSku.size} SKU</div></div>
    <div class="card bal"><div class="lbl">คงเหลือ (จ่าย−รับ)</div><div class="val">${fmt(balQty)}</div><div class="sub">ชิ้น</div></div>`;
  if(money){
    cards+=`<div class="card money"><div class="lbl">มูลค่าคงเหลือ</div><div class="val">${fmtM(balVal)}</div><div class="sub">บาท</div></div>`;
  }
  $('cards').innerHTML=cards;

  // table
  let head=`<tr><th>${GRAN==='year'?'ปี':GRAN==='day'?'วันที่':'เดือน'}</th><th>จ่าย SKU</th><th>จ่าย จำนวน</th><th>รับ SKU</th><th>รับ จำนวน</th><th>คงเหลือ`;
  if(money) head+=`</th><th>จ่าย (บาท)</th><th>รับ (บาท)</th><th>คงเหลือ (บาท)`;
  head+='</th></tr>';
  let run=0, runV=0, body='';
  order.forEach(k=>{
    const g=groups[k]; run+=(g.outQty-g.inQty); runV+=(g.outVal-g.inVal);
    body+=`<tr><td class="k">${periodLabel(k)}</td><td>${fmt(g.outQR.size)}</td><td>${fmt(g.outQty)}</td><td>${fmt(g.inQR.size)}</td><td>${fmt(g.inQty)}</td><td>${fmt(run)}</td>`;
    if(money) body+=`<td>${fmtM(g.outVal)}</td><td>${fmtM(g.inVal)}</td><td>${fmtM(runV)}</td>`;
    body+='</tr>';
  });
  body+=`<tr class="total"><td class="k">รวม</td><td>${fmt(T.outSku.size)}</td><td>${fmt(T.outQty)}</td><td>${fmt(T.inSku.size)}</td><td>${fmt(T.inQty)}</td><td>${fmt(balQty)}</td>`;
  if(money) body+=`<td>${fmtM(T.outVal)}</td><td>${fmtM(T.inVal)}</td><td>${fmtM(balVal)}</td>`;
  body+='</tr>';
  $('tbl').innerHTML=head+body;

  // chart — มูลค่า(บาท) ถ้าเป็น admin / ไม่งั้นใช้จำนวน
  const labels=order.map(periodLabel);
  const useVal = money;
  const chartTitle = useVal ? 'กราฟ จ่าย / รับ (มูลค่า บาท)' : 'กราฟ จ่าย / รับ (จำนวนชิ้น)';
  const ch = $('chartTitle'); if(ch) ch.textContent = chartTitle;
  if(chart) chart.destroy();
  chart=new Chart($('chart'),{
    type:'bar',
    data:{labels,datasets:[
      {label:useVal?'จ่าย (บาท)':'จ่าย',data:order.map(k=>useVal?groups[k].outVal:groups[k].outQty),backgroundColor:'#70ad47'},
      {label:useVal?'รับ (บาท)':'รับ',data:order.map(k=>useVal?groups[k].inVal:groups[k].inQty),backgroundColor:'#ed7d31'}
    ]},
    options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{y:{beginAtZero:true}}},
    plugins:[barValueLabels]
  });

  $('foot').textContent = `แสดง ${recs.length.toLocaleString()} รายการ · ${mall==='__ALL__'?'ทุกห้าง':mall}`;
}

// แถบ "กระทบเช็คล่าสุด" — คงเหลือจริง + ขายสะสม (โผล่เมื่อเลือกห้างเฉพาะ)
function loadMallStatus(mall, silent){
  const el = $('mallStatus');
  if(!mall){ el.innerHTML=''; if(silent) hideLoading(); return; }
  el.innerHTML = '';
  if(!silent) showLoading('กำลังโหลดยอดกระทบเช็ค...'); // silent = ใช้ loader เดิม (ไม่หมุนซ้ำ)
  api({user:CRED.user, pass:CRED.pass, action:'mallstatus', mall:mall, from:$('fFrom').value, to:$('fTo').value}, (err,res)=>{
    hideLoading();
    if(err || !res.ok){ el.innerHTML=''; return; }
    if(!res.hasCheck){
      el.innerHTML = mall==='__ALL__'
        ? '<div class="panel" style="font-size:13px;color:var(--muted)">📦 ยังไม่มีห้างไหนเช็คสต็อก — ยอดคงเหลือด้านบนเป็นตามบัญชี (จ่าย−รับ)</div>'
        : '<div class="panel" style="font-size:13px;color:var(--muted)">📦 ห้างนี้ยังไม่เคยเช็คสต็อก — ยอดคงเหลือด้านบนเป็นตามบัญชี (จ่าย−รับ)</div>';
      return;
    }
    let cards = `<div class="card bal"><div class="lbl">คงเหลือจริง</div><div class="val">${fmt(res.expectedQty)}</div><div class="sub">ชิ้น (หักการนับแล้ว)</div></div>
      <div class="card sold" style="border-color:#c0392b"><div class="lbl">ขาย/หาย (จากการเช็ค)</div><div class="val" style="color:#c0392b">${fmt(res.soldQty)}</div><div class="sub">ชิ้น (ประมาณ)</div></div>`;
    if(res.expectedVal!==undefined){
      cards += `<div class="card money"><div class="lbl">มูลค่าคงเหลือจริง</div><div class="val">${fmtM(res.expectedVal)}</div><div class="sub">บาท</div></div>
        <div class="card money" style="border-color:#c0392b"><div class="lbl">มูลค่าขาย/หาย สะสม</div><div class="val" style="color:#c0392b">${fmtM(res.soldVal)}</div><div class="sub">บาท</div></div>`;
    }
    const title = res.all
      ? `📦 กระทบเช็ค — รวมทุกห้าง (เช็คแล้ว ${res.mallChecked} ห้าง)`
      : `📦 กระทบเช็คล่าสุด (${fmtDate(res.lastCheckDate)})`;
    el.innerHTML = `<div class="panel"><h3>${title}</h3><div class="cards">${cards}</div></div>`;
  });
}

let MALL_LIST = [];
let PRODUCTS = [];  // สินค้าจาก Price (ไว้ค้นหาเพิ่ม)

// ค้นหาสินค้าจาก Price → เด้งให้กดเพิ่ม (เฉพาะที่ยังไม่อยู่ในรายการ)
function renderAddSuggest(){
  const box = $('cAddSuggest');
  const q = $('cSearch').value.trim().toLowerCase();
  if(q.length < 2){ box.innerHTML=''; return; }
  const inList = {}; CHK.items.forEach(it=>inList[it.qr]=1);
  const hits = PRODUCTS.filter(p=>!inList[p.qr] && ((p.desc||'').toLowerCase().includes(q) || p.qr.toLowerCase().includes(q))).slice(0, 12);
  if(!hits.length){ box.innerHTML='<div class="none">— ไม่พบสินค้าใหม่ที่ตรง (หรือมีในรายการแล้ว) —</div>'; return; }
  box.innerHTML = hits.map(p=>`<div class="sg" data-add="${p.qr}"><div class="nm">${p.desc||p.qr}<b>${p.qr}</b></div><div class="plus">＋</div></div>`).join('');
  box.querySelectorAll('[data-add]').forEach(el=>{ el.onclick = ()=>addProduct(el.dataset.add); });
}

// เพิ่มสินค้าเข้ารายการนับ (ยังไม่กรอกจำนวน)
function addProduct(qr){
  const p = PRODUCTS.find(x=>x.qr===qr); if(!p) return;
  if(!CHK.items.find(x=>x.qr===qr)) CHK.items.unshift({ qr:qr, desc:p.desc||'', expected:0, price:p.price||0, added:true });
  $('cSearch').value=''; $('cAddSuggest').innerHTML='';
  renderCheckList();
  const inp = document.querySelector(`input[data-qr="${qr}"]`);
  if(inp){ const row=$('row_'+qr); if(row){ row.classList.add('hit'); row.scrollIntoView({block:'center'}); setTimeout(()=>row.classList.remove('hit'),700); } inp.focus(); }
}

// โหลดรายชื่อห้าง → เติม dropdown ทั้งเช็คสต็อก (cMall) และรายงานเช็ค (hMall)
function refreshMallDropdowns(cb){
  api({user:CRED.user, pass:CRED.pass, action:'malllist'}, (err,res)=>{
    if(err || !res || !res.ok){ $('cMall').innerHTML='<option>โหลดรายชื่อไม่ได้</option>'; if(cb)cb(); return; }
    MALL_LIST = res.malls;
    // เรียง: ห้างที่เปิดแล้ว (ready) อยู่บนสุด → ที่ยังไม่เปิดอยู่ล่าง
    const sorted = MALL_LIST.slice().sort((a,b)=> (b.ready?1:0)-(a.ready?1:0));
    $('cMall').innerHTML = '<option value="">— เลือกห้าง —</option>' +
      sorted.map(m=>`<option value="${m.name}" ${m.ready?'':'disabled'}>${m.name}${m.ready?'':'  (ยังไม่เปิด)'}</option>`).join('');
    if($('hMall')) $('hMall').innerHTML = '<option value="">— เลือกห้าง —</option>' +
      MALL_LIST.filter(m=>m.ready).map(m=>`<option value="${m.name}">${m.name}</option>`).join('');
    if(cb) cb();
  });
}

// เปิด modal เพิ่มห้าง (เฉพาะห้างที่ยังไม่เปิด)

// ====== auto-save ร่าง (กันข้อมูลหายตอนกรอกค้าง) ======
const DRAFT_PREFIX = 'sm_draft_';
const DRAFT_TTL = 24 * 60 * 60 * 1000; // 24 ชม.
function draftKey(mall){ return DRAFT_PREFIX + mall; }
function saveDraft(){
  if(!CHK.mall) return;
  try{ localStorage.setItem(draftKey(CHK.mall), JSON.stringify({ counted:CHK.counted, notes:CHK.notes, t:Date.now() })); }catch(e){}
}
function loadDraft(mall){
  try{
    const d = JSON.parse(localStorage.getItem(draftKey(mall)) || 'null');
    if(!d) return null;
    if(Date.now() - d.t > DRAFT_TTL){ localStorage.removeItem(draftKey(mall)); return null; }
    const has = d.counted && Object.keys(d.counted).some(k=>{ const v=d.counted[k]; return v!==undefined&&v!==null&&!isNaN(v); });
    return has ? d : null;
  }catch(e){ return null; }
}
function clearDraft(mall){ try{ if(mall) localStorage.removeItem(draftKey(mall)); }catch(e){} }

function renderCheckList(){
  const wrap = $('cList');
  if(!CHK.items.length){ wrap.innerHTML='<div class="notready" style="padding:16px;text-align:center;line-height:1.7">🆕 <b>ห้างใหม่ — ยังไม่มีจ่าย/รับในระบบ</b><br>สแกน QR หรือเพิ่มสินค้าที่นับเจอ เพื่อ<b>ตั้งเบส (นับครั้งแรก)</b> ได้เลย<br><span style="font-size:12px">จ่าย/รับ จะเริ่มมากระทบหลังจากมีข้อมูลเข้าระบบ</span></div>'; updateSum(); return; }
  // สินค้าที่เพิ่มเอง (added) ขึ้นบนสุด (ใหม่สุดบน) — ที่เหลือตามเดิม
  const items = CHK.items.slice().sort((a,b)=>(b.added?1:0)-(a.added?1:0));
  wrap.innerHTML = items.map(it=>{
    const c = CHK.counted[it.qr] ?? '';
    const note = CHK.notes[it.qr] || '';
    const search = ((it.desc||'') + ' ' + it.qr).toLowerCase();
    return `<div class="chkitem ${it.added?'added':''}" data-search="${search}">
      <div class="chkrow" id="row_${it.qr}">
        <div class="nm">${it.desc||it.qr}<b>${it.qr}</b></div>
        <div class="exp" title="ควรมี">${fmt(it.expected)}</div>
        <input type="number" inputmode="numeric" data-qr="${it.qr}" value="${c}" placeholder="นับ">
        <div class="sold" id="sold_${it.qr}"></div>
        ${it.over?`<button class="overBtn" data-over="${it.qr}" title="รอบก่อนนับเกิน">⚠️${it.over}</button>`:''}
        ${it.added?`<button class="delBtn" data-del="${it.qr}" title="ลบ (กรณีเพิ่มผิด)">✕</button>`:''}
        <button class="noteBtn ${note?'on':''}" data-note="${it.qr}" title="หมายเหตุ">📝</button>
      </div>
      <div class="noterow ${note?'':'hidden'}" id="note_${it.qr}">
        <input data-noteinput="${it.qr}" value="${note.replace(/"/g,'&quot;')}" placeholder="หมายเหตุสินค้านี้... เช่น เจอในลิ้นชัก">
      </div>
    </div>`;
  }).join('');
  wrap.querySelectorAll('input[data-qr]').forEach(inp=>{
    inp.oninput = ()=>{ CHK.counted[inp.dataset.qr] = inp.value===''?undefined:Number(inp.value); updateSold(inp.dataset.qr); updateSum(); saveDraft(); };
    inp.onfocus = ()=>inp.select();
    inp.addEventListener('click', ()=>inp.select());
  });
  wrap.querySelectorAll('[data-over]').forEach(b=>{
    b.onclick = ()=>{
      const it = CHK.items.find(x=>x.qr===b.dataset.over); if(!it) return;
      let m = `รอบก่อนนับ "เกิน" ${it.over} ชิ้น\n(นับได้มากกว่าที่ระบบคิด)\n\nตรวจสอบ/ยืนยันยอดอีกครั้ง — อาจเกิดจากหยิบขายผิดตัว/นับตก/วางผิดช่อง`;
      if(it.overNote) m += `\n\n📝 หมายเหตุรอบก่อน: ${it.overNote}`;
      showConfirm(m, ()=>{}, { icon:'⚠️', title:'รอบก่อนหยอดเกิน', okText:'รับทราบ' });
    };
  });
  wrap.querySelectorAll('[data-del]').forEach(b=>{ b.onclick = ()=>removeItem(b.dataset.del); });
  wrap.querySelectorAll('[data-note]').forEach(b=>{
    b.onclick = ()=>{ const r=$('note_'+b.dataset.note); r.classList.toggle('hidden'); const ni=r.querySelector('input'); if(!r.classList.contains('hidden')&&ni) ni.focus(); };
  });
  wrap.querySelectorAll('[data-noteinput]').forEach(ni=>{
    ni.oninput = ()=>{ const q=ni.dataset.noteinput; CHK.notes[q]=ni.value; const b=wrap.querySelector(`[data-note="${q}"]`); if(b) b.classList.toggle('on', !!ni.value.trim()); saveDraft(); };
  });
  CHK.items.forEach(it=>updateSold(it.qr));
  updateSum();
}

// ลบสินค้าที่เพิ่มเอง (เฉพาะที่ added) — กรณีเพิ่มผิด
function removeItem(qr){
  CHK.items = CHK.items.filter(x=>x.qr!==qr);
  delete CHK.counted[qr]; delete CHK.notes[qr];
  saveDraft(); renderCheckList();
}

// ค้นหาสินค้าในรายการ
function filterCheckList(){
  const q = $('cSearch').value.trim().toLowerCase();
  document.querySelectorAll('#cList .chkitem').forEach(item=>{
    item.style.display = (!q || item.dataset.search.includes(q)) ? '' : 'none';
  });
}

function updateSold(qr){
  const it = CHK.items.find(x=>x.qr===qr); if(!it) return;
  const counted = CHK.counted[qr];
  const el = $('sold_'+qr);
  if(counted===undefined || counted===null || isNaN(counted)){ el.textContent=''; return; }
  const sold = it.expected - counted; // ขายไป
  el.textContent = sold>0 ? '−'+fmt(sold) : (sold===0?'✓':'+'+fmt(-sold));
  el.className = 'sold ' + (sold>0?'pos':'zero');
}

function updateSum(){
  let soldQty=0, soldVal=0, overQty=0, countedItems=0;
  CHK.items.forEach(it=>{
    const c=CHK.counted[it.qr];
    if(c===undefined||c===null||isNaN(c)) return;
    countedItems++;
    const diff=it.expected-c;
    if(diff>0){ soldQty+=diff; soldVal+=diff*(it.price||0); }  // ขาด = ขายไป
    else if(diff<0){ overQty+=(-diff); }                       // เกิน = พบเพิ่ม
  });
  let html = `<div class="box"><div class="l">นับแล้ว</div><div class="v">${countedItems}/${CHK.items.length}</div></div>
    <div class="box sold"><div class="l">ขายไป (ประมาณ)</div><div class="v">${fmt(soldQty)}</div></div>`;
  if(CHK.money) html += `<div class="box sold"><div class="l">มูลค่าขาย</div><div class="v">${fmtM(soldVal)}</div></div>`;
  if(overQty>0) html += `<div class="box" style="border-color:#0b8043"><div class="l">พบเกิน (+)</div><div class="v" style="color:#0b8043">${fmt(overQty)}</div></div>`;
  $('cSum').innerHTML = html;
}

// ====== สแกน QR ======
function startScan(){
  $('scanMsg').textContent='';
  $('cScanBtn').classList.add('hidden');
  $('cStopBtn').classList.remove('hidden');
  qrScanner = new Html5Qrcode('reader');
  qrScanner.start({ facingMode:'environment' }, { fps:10, qrbox:220 },
    txt=>onScan(txt),
    ()=>{}
  ).catch(e=>{
    $('scanMsg').textContent='เปิดกล้องไม่ได้: '+e+' (ต้องใช้ผ่าน https)';
    $('cScanBtn').classList.remove('hidden'); $('cStopBtn').classList.add('hidden');
  });
}
function stopScan(){
  if(qrScanner){ qrScanner.stop().then(()=>qrScanner.clear()).catch(()=>{}); qrScanner=null; }
  $('cScanBtn').classList.remove('hidden'); $('cStopBtn').classList.add('hidden');
}
let lastScan='', lastScanT=0;
function onScan(txt){
  const qr = String(txt).trim();
  const now = Date.now();
  if(qr===lastScan && now-lastScanT<1500) return; // กันสแกนซ้ำรัว
  lastScan=qr; lastScanT=now;
  let it = CHK.items.find(x=>x.qr===qr);
  if(!it){ // QR ใหม่ ไม่อยู่ในรายการ → เพิ่มเข้าไป (ตั้งเบส)
    const fromPrice = PRODUCTS.find(x=>x.qr===qr);
    it = { qr:qr, desc:(fromPrice&&fromPrice.desc)||'(สินค้าใหม่)', expected:0, price:(fromPrice&&fromPrice.price)||0, added:true };
    CHK.items.unshift(it);
    renderCheckList();
  }
  CHK.counted[qr] = (CHK.counted[qr]||0) + 1;
  const inp = document.querySelector(`input[data-qr="${qr}"]`);
  if(inp){ inp.value = CHK.counted[qr]; }
  updateSold(qr); updateSum(); saveDraft();
  const row = $('row_'+qr);
  if(row){ row.classList.add('hit'); row.scrollIntoView({block:'center',behavior:'smooth'}); setTimeout(()=>row.classList.remove('hit'),700); }
  $('scanMsg').textContent = '✓ '+(it.desc||qr)+' = '+CHK.counted[qr];
}

// ====== บันทึก (POST no-cors) ======
function saveCheck(){
  const counted = CHK.items.filter(it=>{ const c=CHK.counted[it.qr]; return c!==undefined&&c!==null&&!isNaN(c); });
  if(!counted.length){ $('cSaveMsg').textContent='ยังไม่ได้กรอก/สแกนสินค้า'; return; }
  const total = CHK.items.length;
  const isBase = !CHK.hasBaseline;
  const skipped = total - counted.length;
  let msg = `${CHK.mall}\nกรอกแล้ว ${counted.length}/${total} รายการ`;
  let opt = { okText:'บันทึก' };
  if(isBase && skipped > 0){
    // ตั้งเบส + ยังไม่ครบ → เตือนเข้ม
    msg += `\n\n⚠️ ตั้งเบสครั้งแรก ควรนับให้ครบทุกตัว\nยังเหลืออีก ${skipped} รายการที่ยังไม่กรอก`;
    opt = { okText:'บันทึกเลย', icon:'⚠️', title:'ตั้งเบสยังไม่ครบ' };
  } else if(skipped > 0){
    msg += `\n(อีก ${skipped} รายการที่ไม่กรอก = ข้าม ไม่นับ)`;
  }
  showConfirm(msg, doSave, opt);
}

function doSave(){
  const counted = CHK.items.filter(it=>{ const c=CHK.counted[it.qr]; return c!==undefined&&c!==null&&!isNaN(c); });
  showLoading('กำลังบันทึก...');
  const payload = {
    user:CRED.user, pass:CRED.pass, mall:CHK.mall, date:$('cDate').value, note:'',
    items: counted.map(it=>({ qr:it.qr, desc:it.desc, counted:CHK.counted[it.qr], note:(CHK.notes[it.qr]||'').trim() }))
  };
  const savedMall = CHK.mall;
  fetch(API_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) })
    .then(()=>{
      hideLoading();
      clearDraft(savedMall);   // บันทึกจริงแล้ว ลบร่าง
      resetCheck();   // เด้งกลับสถานะเริ่มต้น (เหมือนก่อนเลือกห้าง)
      $('cStatus').style.color = '#0b8043';
      $('cStatus').textContent = `✅ บันทึกผลเช็ค "${savedMall}" เรียบร้อยแล้ว`;
    })
    .catch(()=>{ hideLoading(); $('cSaveMsg').style.color='#c0392b'; $('cSaveMsg').textContent='บันทึกไม่สำเร็จ ลองใหม่'; });
}

// โหลด CSV "สรุปต่อสินค้า" ของห้างที่เลือก (ยอดจริงหลังกระทบ — 1 SKU = 1 แถว)
function exportMallCSV(){
  const mall = $('hMall').value;
  if(!mall){ $('hStatus').textContent='เลือกห้างก่อน'; return; }
  const from=$('hFrom').value, to=$('hTo').value;
  showLoading('กำลังสรุปยอด...');
  // 1) คงเหลือปัจจุบันต่อ SKU
  api({user:CRED.user, pass:CRED.pass, action:'expected', mall:mall}, (e1,exp)=>{
    if(e1 || !exp || !exp.ok){ hideLoading(); alert('โหลดไม่ได้'); return; }
    // 2) ขาย/หาย รวมต่อ SKU (จากประวัติเช็คในช่วง)
    api({user:CRED.user, pass:CRED.pass, action:'checkhistory', mall:mall}, (e2,hist)=>{
      hideLoading();
      if(e2 || !hist || !hist.ok){ alert('โหลดไม่ได้'); return; }
      const money = exp.canSeeMoney;
      const sold={}, soldVal={};
      hist.rounds.forEach(r=>{
        if(from && r.date<from) return; if(to && r.date>to) return;
        r.items.forEach(it=>{ if(it.sold>0){ sold[it.qr]=(sold[it.qr]||0)+it.sold; soldVal[it.qr]=(soldVal[it.qr]||0)+(it.val||0); } });
      });
      // รวม SKU จากคงเหลือ + ที่มีการขาย
      const map={};
      exp.items.forEach(it=>{ map[it.qr]={qr:it.qr, desc:it.desc, cur:it.expected, price:it.price||0}; });
      Object.keys(sold).forEach(qr=>{ if(!map[qr]) map[qr]={qr:qr, desc:'', cur:0, price:0}; });
      const rows=Object.keys(map).map(k=>map[k]).sort((a,b)=>a.qr<b.qr?-1:1);
      if(!rows.length){ alert('ยังไม่มีข้อมูล (ห้างนี้อาจยังไม่ได้ตั้งเบส)'); return; }

      const esc = v => { v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
      const head=['สถานที่','รหัส QR','ชื่อสินค้า','คงเหลือปัจจุบัน','ขาย/หาย รวม'];
      if(money) head.push('มูลค่าคงเหลือ(บาท)','มูลค่าขาย/หาย(บาท)');
      const lines=[head.join(',')];
      rows.forEach(r=>{
        const row=[mall, r.qr, r.desc, r.cur, (sold[r.qr]||0)];
        if(money) row.push((r.cur*r.price), (soldVal[r.qr]||0));
        lines.push(row.map(esc).join(','));
      });
      const csv='﻿'+lines.join('\r\n');
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url; a.download=`สรุปสต็อก_${mall}_${from||'all'}_${to||'all'}.csv`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    });
  });
}

// สร้าง + ดาวน์โหลด CSV (ใช้ร่วม) — Excel อ่านไทยได้ (ใส่ BOM)
function downloadCheckCSV(list, money, filename){
  const esc = v => { v = String(v==null?'':v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  const head = ['สถานที่','วันที่','ประเภท','ผู้ตรวจ','รหัส QR','ชื่อสินค้า','คงเหลือ(นับได้)','ควรมี','ขาย/หาย'];
  if(money) head.push('มูลค่าขาย/หาย(บาท)');
  head.push('หมายเหตุ');
  const lines = [head.join(',')];
  list.forEach(({mall, r})=>{
    const typeTh = r.type==='base'?'ตั้งเบส':'รอบตรวจ';
    r.items.forEach(it=>{
      const row = [mall, r.date, typeTh, r.user, it.qr, it.desc, it.counted,
        (it.expected==null?'':it.expected), (it.sold==null?'':it.sold)];
      if(money) row.push(it.val==null?'':it.val);
      row.push(it.note||'');
      lines.push(row.map(esc).join(','));
    });
  });
  const csv = '﻿' + lines.join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

// ส่งออก CSV เฉพาะรอบเดียว (ข้อมูล ณ ตอนเช็คนั้นๆ) — Excel อ่านไทยได้ (ใส่ BOM)
function exportRoundCSV(roundId){
  const r = HIST.rounds.find(x=>x.roundId===roundId);
  if(!r){ alert('ไม่พบรอบนี้'); return; }
  const mall = $('hMall').value;
  const money = HIST.money;
  const esc = v => { v = String(v==null?'':v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  const typeTh = r.type==='base'?'ตั้งเบส':'รอบตรวจ';
  const head = ['สถานที่','วันที่','ประเภท','ผู้ตรวจ','รหัส QR','ชื่อสินค้า','คงเหลือ(นับได้)','ควรมี','ขาย/หาย'];
  if(money) head.push('มูลค่าขาย/หาย(บาท)');
  head.push('หมายเหตุ');
  const lines = [head.join(',')];
  r.items.forEach(it=>{
    const row = [mall, r.date, typeTh, r.user, it.qr, it.desc, it.counted,
      (it.expected==null?'':it.expected), (it.sold==null?'':it.sold)];
    if(money) row.push(it.val==null?'':it.val);
    row.push(it.note||'');
    lines.push(row.map(esc).join(','));
  });
  const csv = '﻿' + lines.join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `StockCheck_${mall}_${r.date}_${typeTh}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function loadHistory(){
  const mall = $('hMall').value;
  if(!mall){ $('hStatus').textContent='เลือกห้างก่อน'; return; }
  $('hPanel').classList.add('hidden');
  showLoading('กำลังโหลดประวัติ...');
  api({user:CRED.user, pass:CRED.pass, action:'checkhistory', mall:mall}, (err,res)=>{
    hideLoading();
    if(err){ $('hStatus').textContent=err; return; }
    if(!res.ok){ $('hStatus').textContent=res.error||'โหลดไม่ได้'; return; }
    if(!res.rounds.length){ $('hStatus').textContent='ยังไม่มีประวัติการเช็คของห้างนี้'; return; }
    HIST = { rounds: res.rounds, money: res.canSeeMoney };
    $('hStatus').textContent = '';
    $('hPanel').classList.remove('hidden');
    renderHist();
  });
}

function fmtDate(s){ const p=String(s).split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s; }

function renderHist(){
  // กรองตามช่วงวัน
  const from=$('hFrom').value, to=$('hTo').value;
  let rounds = HIST.rounds.filter(r=>(!from||r.date>=from)&&(!to||r.date<=to));
  if(!rounds.length){ $('hRounds').innerHTML='<div class="notready" style="padding:14px;text-align:center">ไม่มีรอบเช็คในช่วงวันที่เลือก</div>'; return; }

  // การ์ดแต่ละรอบ (ล่าสุดอยู่บน)
  $('hRounds').innerHTML = rounds.map((r,i)=>{
    const isBase = r.type==='base';
    const badge = isBase ? '<span class="badge base">ตั้งเบส</span>' : '<span class="badge check">รอบตรวจ</span>';
    const soldHtml = isBase ? '<span style="color:var(--muted);font-size:13px">เบสตั้งต้น</span>'
      : `<div class="q">−${fmt(r.soldQty)}</div>${HIST.money?`<div class="m">${fmtM(r.soldVal||0)} บาท</div>`:''}${r.overQty?`<div class="m" style="color:#0b8043">เกิน +${fmt(r.overQty)}</div>`:''}`;
    const detail = r.items.map(it=>{
      let sCol='', sTxt='';
      if(!isBase){ const s=it.sold; sCol=s>0?'pos':'zero'; sTxt = s>0?'−'+fmt(s):(s===0?'✓':'+'+fmt(-s)); }
      return `<div class="ditem">
        <div class="dn">${it.desc||it.qr}<b>${it.qr}</b>${it.note?`<span class="dnote">📝 ${it.note}</span>`:''}</div>
        ${isBase?'':`<div class="dc" title="ควรมี">${fmt(it.expected)}</div>`}
        <div class="dc" title="นับได้">${fmt(it.counted)}</div>
        ${isBase?'':`<div class="dsold sold ${sCol}">${sTxt}</div>`}
      </div>`;
    }).join('');
    return `<div class="roundcard">
      <div class="roundhd" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.arrow').textContent=this.nextElementSibling.classList.contains('open')?'▲':'▼'">
        <div class="dt"><b>${fmtDate(r.date)}</b> ${badge}<span>โดย ${r.user} · ${r.itemCount} รายการ</span></div>
        <div class="sv">${soldHtml}</div>
        <button onclick="event.stopPropagation();exportRoundCSV('${r.roundId}')" title="โหลด Excel รอบนี้" style="border:0;background:#eef1f5;border-radius:7px;width:34px;height:34px;cursor:pointer;font-size:14px;flex:0 0 auto">⬇️</button>
        <div class="arrow">▼</div>
      </div>
      <div class="rounddetail">
        <div class="ditem" style="font-weight:700;color:var(--muted);font-size:11px">
          <div class="dn">สินค้า</div>${isBase?'':'<div class="dc">ควรมี</div>'}<div class="dc">นับได้</div>${isBase?'':'<div class="dsold">ขาย</div>'}
        </div>
        ${detail}
      </div>
    </div>`;
  }).join('');
}

// ====== เริ่มต้น: ลองล็อกอินอัตโนมัติจากที่จำไว้ ======
tryAutoLogin();
</script>
